version: 1
opt: 2
mode: dasd
base:
  result_path: "result/demo"
  exp_name: "dasd_debug"
  dtype: fp16
  seed: 42
  ssh_key: ~/.ssh/id_ed25519_server
  max_len: 2048
server:
  process_name: server
  target_model: Qwen/Qwen3-14B
  device: cuda:0
  temperature: 0.7
  max_batch_size: 1
  num_clients: 1
  batch_type: static
  cache_prefill: true
client:
  host: 127.0.0.1:8000
  process_name: client
  draft_model: Qwen/Qwen3-1.7B
  dataset: specbench
  reasoning: false
  sample_req_cnt: 1
  req_offset: 0
  max_n_beams: 32
  max_beam_len: 4
  max_branch_width: 16
  max_budget: 32
  proactive:
    type: excluded
    max_n_beams: 32
    max_beam_len: 3
    max_branch_width: 16
    max_budget: 32
  max_new_tokens: 32
  max_request_num: 1
dasd:
  enable_async: true
  start_window: 4
  W_min: 4
  W_max: 4
  alpha: 1
  beta: 0.5
  max_inflight_bundles: 1
  max_spec_buffer_tokens: 32
  adaptive_credit_enabled: false
  adaptive_window_enabled: false
  adaptive_tree_budget_enabled: false
  credit_min: 0
  credit_max: 16
  credit_init: 4
  rejection_penalty: 2
  success_bonus: 1
  min_window: 4
  max_window: 4
  min_tree_depth: 1
  max_tree_depth: 4
  min_leaf_budget: 4
  max_leaf_budget: 16
  failure_cache_enabled: true
  failure_cache_cooldown: 3
  failure_cache_max_tokens_per_prefix: 4
  recovery_mode_enabled: true
  recovery_full_rejection_threshold: 3
  recovery_same_base_retry_threshold: 3
  recovery_mode_rounds: 2
  recovery_forced_w: 1
  recovery_forced_tree_depth: 1
  recovery_forced_leaf_budget: 2
  global_budget_C_total: 0
  ema_decay: 0.9
  rollback_avoid_failed_token: true
  debug: true
node:
  localhost:
  - device: cuda:1
