syntax = "proto3";

package specedge;

service SpecEdgeService {
    rpc Validate (ValidateRequest) returns (ValidateResponse) {}
    rpc Sync (SyncRequest) returns (SyncResponse) {}
    rpc VerifyBundleAsync (VerifyBundleRequest) returns (VerifyBundleResponse) {}
}

message ValidateRequest {
    int32 client_idx = 1;
    int32 req_idx = 2;
    bytes input_ids = 3;
    bytes position_ids = 4;
    bytes cache_seq_indices = 5;
    bytes parent_indices = 6;
    bytes attention_mask = 7;
    bool prefill = 8;
    optional string prefix = 9;
}

message ValidateResponse {
    bytes selection = 1;
    int32 prefill = 2;
}

message SyncRequest { }
message SyncResponse { }

message VerifyBundleRequest {
    string client_id = 1;
    string request_id = 2;
    int64 bundle_id = 3;
    int32 base_token_index = 4;
    string prompt_hash = 5;
    string prefix_hash = 6;
    repeated int32 token_ids = 7;
    int64 timestamp_send_ms = 8;
    string draft_model_id = 9;
    int32 epoch = 10;
}

message VerifyBundleResponse {
    string request_id = 1;
    int64 bundle_id = 2;
    int32 base_token_index = 3;
    repeated bool accept_bitmap = 4;
    int32 accepted_len = 5;
    float r_obs = 6;
    int32 next_credit = 7;
    float server_queue_delay_ms = 8;
    float server_service_ms = 9;
    string reject_reason = 10;
    bool verifier_poisoned = 11;
    int32 verifier_next_token_id = 12;
    bool forced_commit_eligible = 13;
}
